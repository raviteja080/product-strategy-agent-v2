<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Strategy AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#05080f;--surface:#0a0f1a;--surface2:#111827;--surface3:#161f2e;
  --border:#1c2a3a;--border2:#243040;
  --accent:#4285f4;--accent-glow:rgba(66,133,244,0.15);
  --accent2:#f59e0b;--accent3:#10b981;--accent4:#a855f7;
  --red:#ef4444;--text:#94a3b8;--text-dim:#3d5068;
  --text-bright:#e2e8f0;--text-white:#f8fafc;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(66,133,244,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(66,133,244,0.03) 1px,transparent 1px);
  background-size:48px 48px;}

/* ── Header ── */
header{position:relative;z-index:10;padding:16px 32px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;background:rgba(5,8,15,0.97);}
.brand{display:flex;align-items:center;gap:12px;}
.brand-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#1a56db,#4285f4);
  display:grid;place-items:center;font-size:18px;box-shadow:0 0 16px rgba(66,133,244,0.4);}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--text-white);}
.brand-name span{color:var(--accent);}
.brand-sub{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:12px;}
.badge{padding:5px 12px;border:1px solid rgba(66,133,244,0.3);border-radius:20px;
  background:rgba(66,133,244,0.06);font-size:11px;color:var(--accent);}
.btn-history{padding:6px 14px;border:1px solid var(--border2);border-radius:8px;
  background:var(--surface2);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;
  cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.btn-history:hover{border-color:var(--accent);color:var(--accent);}

/* ── Layout ── */
main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:36px 24px;}

/* ── API + search area ── */
.top-area{margin-bottom:28px;}
.api-row{background:rgba(66,133,244,0.06);border:1px solid rgba(66,133,244,0.2);
  border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.api-key-input{flex:1;background:transparent;border:none;
  border-bottom:1px solid rgba(66,133,244,0.3);color:var(--text-bright);
  font-family:'DM Mono',monospace;font-size:13px;padding:4px 0;outline:none;}
.api-key-input::placeholder{color:rgba(66,133,244,0.4);}
.api-hint{font-size:11px;color:rgba(66,133,244,0.6);white-space:nowrap;}

/* Mode toggle */
.mode-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.mode-btn{padding:8px 18px;border:1px solid var(--border2);border-radius:8px;
  background:transparent;color:var(--text-dim);font-family:'DM Mono',monospace;
  font-size:12px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:7px;}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.mode-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}

/* Search inputs */
.search-row{display:flex;gap:10px;align-items:center;}
.search-wrap{position:relative;flex:1;}
.search-input{width:100%;background:var(--surface);border:1.5px solid var(--border2);
  border-radius:10px;color:var(--text-white);font-family:'DM Mono',monospace;
  font-size:14px;padding:14px 18px;outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.search-input::placeholder{color:var(--text-dim);}
.vs-badge{padding:8px 14px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:8px;font-size:12px;color:var(--text-dim);white-space:nowrap;}
.search-btn{padding:14px 28px;background:var(--accent);border:none;border-radius:10px;
  color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;display:flex;align-items:center;gap:8px;}
.search-btn:hover:not(:disabled){background:#2b6fd4;box-shadow:0 4px 16px rgba(66,133,244,0.4);}
.search-btn:disabled{opacity:0.5;cursor:not-allowed;}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
.search-btn.loading .btn-label{display:none;}
.search-btn.loading .spinner{display:block;}
@keyframes spin{to{transform:rotate(360deg);}}

.examples{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.chip{padding:5px 12px;border:1px solid var(--border2);border-radius:20px;font-size:11px;
  color:var(--text-dim);cursor:pointer;background:transparent;font-family:'DM Mono',monospace;
  transition:all 0.15s;}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}

/* ── Status ── */
#status{display:none;padding:12px 18px;background:var(--surface);
  border:1px solid rgba(66,133,244,0.2);border-radius:8px;font-size:12px;
  color:var(--accent);margin-bottom:20px;align-items:center;gap:10px;}
#status.visible{display:flex;}
.spin2{width:13px;height:13px;border:2px solid rgba(66,133,244,0.3);
  border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}

/* ── Results ── */
#results{display:none;}
#results.visible{display:block;}

/* ── Compare layout ── */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
.compare-col{background:var(--surface);border:1px solid var(--border2);border-radius:12px;overflow:hidden;}
.compare-col-header{padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.compare-col-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text-white);}
.compare-col-meta{font-size:11px;color:var(--text-dim);}

/* ── Tabs ── */
.tabs{display:flex;gap:3px;border-bottom:1px solid var(--border);margin-bottom:22px;overflow-x:auto;}
.tab{padding:10px 16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);
  border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:all 0.2s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text-white);border-bottom-color:var(--accent);}
.tab-num{width:18px;height:18px;border-radius:50%;background:var(--border2);
  font-size:9px;display:grid;place-items:center;}
.tab.active .tab-num{background:var(--accent);}

.panel{display:none;}
.panel.active{display:block;animation:fadeUp 0.3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── Section grid ── */
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.section-grid.full{grid-template-columns:1fr;}
.section-grid.three{grid-template-columns:1fr 1fr 1fr;}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border2);border-radius:12px;
  padding:20px 22px;position:relative;overflow:hidden;}
.card.full{grid-column:1/-1;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.card.blue::before{background:linear-gradient(90deg,#4285f4,#74a9f7);}
.card.amber::before{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
.card.green::before{background:linear-gradient(90deg,#10b981,#34d399);}
.card.purple::before{background:linear-gradient(90deg,#a855f7,#c084fc);}
.card.red::before{background:linear-gradient(90deg,#ef4444,#f87171);}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;
  color:var(--text-white);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.card-body{font-size:12px;line-height:1.85;color:var(--text);}
.card-body h3{font-size:10px;text-transform:uppercase;letter-spacing:2px;
  color:var(--text-dim);margin:14px 0 7px;}
.card-body h3:first-child{margin-top:0;}
.card-body p{margin-bottom:8px;}
.card-body p:last-child{margin-bottom:0;}
.card-body strong{color:var(--text-bright);font-weight:500;}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:4px;font-size:10px;margin-right:5px;}
.tag.blue{background:rgba(66,133,244,0.12);color:#74a9f7;border:1px solid rgba(66,133,244,0.2);}
.tag.amber{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.2);}
.tag.green{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.2);}
.tag.red{background:rgba(239,68,68,0.1);color:#fca5a5;border:1px solid rgba(239,68,68,0.2);}
.tag.purple{background:rgba(168,85,247,0.12);color:#c084fc;border:1px solid rgba(168,85,247,0.2);}

/* ── Stat row ── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:6px;}
.stat-value{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text-white);}
.stat-sub{font-size:11px;color:var(--text-dim);margin-top:3px;}

/* ── Sentiment gauge ── */
.sentiment-bars{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.sent-row{display:flex;align-items:center;gap:10px;}
.sent-label{font-size:11px;width:60px;flex-shrink:0;}
.sent-bar-bg{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden;}
.sent-bar-fill{height:100%;border-radius:4px;transition:width 1.2s ease;}
.sent-val{font-size:11px;width:32px;text-align:right;flex-shrink:0;}

/* ── Competitor table ── */
.comp-table{width:100%;border-collapse:collapse;font-size:12px;}
.comp-table th{padding:8px 12px;text-align:left;font-size:10px;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--text-dim);border-bottom:1px solid var(--border);font-weight:500;}
.comp-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top;}
.comp-table tr:last-child td{border-bottom:none;}
.comp-table tr:hover td{background:rgba(255,255,255,0.02);}
.comp-name{color:var(--text-white);font-weight:500;}
.threat-high{color:#fca5a5;}
.threat-medium{color:#fbbf24;}
.threat-low{color:#34d399;}

/* ── Levels ── */
.levels-grid{display:flex;flex-direction:column;gap:8px;}
.level-row{display:grid;grid-template-columns:140px 1fr;gap:12px;align-items:flex-start;
  padding:11px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;}
.level-num{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--border2);}
.level-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-top:3px;}
.level-content{font-size:12px;line-height:1.7;color:var(--text);}

/* ── Diff cards ── */
.diff-list{display:flex;flex-direction:column;gap:11px;}
.diff-item{background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  padding:14px 16px 14px 24px;position:relative;transition:border-color 0.2s;}
.diff-item:hover{border-color:rgba(16,185,129,0.3);}
.diff-item::before{content:attr(data-n);position:absolute;left:-1px;top:-1px;width:24px;
  background:var(--accent3);border-radius:9px 0 7px 0;font-family:'Syne',sans-serif;
  font-size:10px;font-weight:800;color:#fff;text-align:center;padding:3px 0;}
.diff-dim{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--accent3);margin-bottom:4px;}
.diff-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text-white);margin-bottom:5px;}
.diff-text{font-size:12px;line-height:1.75;color:var(--text);}
.diff-why{font-size:11px;color:var(--text-dim);margin-top:6px;line-height:1.6;}

/* ── Chart containers ── */
.chart-wrap{position:relative;height:200px;margin-top:4px;}
.chart-wrap.tall{height:240px;}

/* ── Sources ── */
.sources{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
.sources-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:7px;}
.source-chips{display:flex;flex-wrap:wrap;gap:5px;}
.source-chip{padding:3px 9px;background:var(--surface2);border:1px solid var(--border);
  border-radius:4px;color:var(--text-dim);text-decoration:none;font-size:10px;
  max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  display:block;transition:all 0.15s;}
.source-chip:hover{border-color:var(--accent);color:var(--accent);}

/* ── Banner ── */
.banner{background:linear-gradient(135deg,var(--surface),rgba(66,133,244,0.07));
  border:1px solid var(--border2);border-radius:12px;padding:20px 24px;
  margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}
.banner-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
  color:var(--text-white);margin-bottom:4px;}
.banner-meta{font-size:12px;color:var(--text-dim);line-height:1.7;}
.banner-tag{padding:6px 13px;background:rgba(66,133,244,0.1);border:1px solid rgba(66,133,244,0.25);
  border-radius:7px;font-size:11px;color:var(--accent);white-space:nowrap;
  text-transform:uppercase;letter-spacing:1px;flex-shrink:0;}

/* ── Compare banner ── */
.compare-banner{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-bottom:22px;}
.compare-banner .banner{margin-bottom:0;flex:1;}
.vs-circle{width:48px;height:48px;border-radius:50%;background:var(--surface2);
  border:2px solid var(--border2);display:grid;place-items:center;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--text-dim);flex-shrink:0;}

/* ── History panel ── */
.history-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);
  backdrop-filter:blur(4px);}
.history-overlay.open{display:flex;align-items:flex-start;justify-content:flex-end;}
.history-panel{width:380px;height:100vh;background:var(--surface);border-left:1px solid var(--border2);
  padding:24px;overflow-y:auto;animation:slideIn 0.3s ease;}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.history-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text-white);}
.btn-close{background:transparent;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;
  padding:4px;transition:color 0.2s;}
.btn-close:hover{color:var(--text-white);}
.history-empty{text-align:center;color:var(--text-dim);font-size:12px;margin-top:40px;}
.history-item{background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;}
.history-item:hover{border-color:var(--accent);}
.hi-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text-white);margin-bottom:4px;}
.hi-meta{font-size:11px;color:var(--text-dim);}
.hi-time{font-size:10px;color:var(--text-dim);margin-top:6px;}
.btn-clear-hist{width:100%;padding:10px;background:rgba(239,68,68,0.08);
  border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:#fca5a5;
  font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;margin-top:12px;transition:all 0.2s;}
.btn-clear-hist:hover{background:rgba(239,68,68,0.15);}

/* ── Error ── */
.error-box{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);
  border-radius:10px;padding:20px;color:#fca5a5;font-size:12px;line-height:1.8;}

/* Skeleton */
.sk{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px;height:12px;margin-bottom:9px;}
.sk.med{width:70%;}.sk.short{width:40%;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

@media(max-width:768px){
  .section-grid,.section-grid.three,.compare-grid{grid-template-columns:1fr;}
  .stat-row{grid-template-columns:1fr 1fr;}
  header{padding:14px 18px;}
  main{padding:24px 14px;}
  .compare-banner{grid-template-columns:1fr;}.vs-circle{display:none;}
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">🧠</div>
    <div>
      <div class="brand-name">Strategy<span>AI</span></div>
      <div class="brand-sub">Product Intelligence Agent</div>
    </div>
  </div>
  <div class="header-right">
    <div class="badge">⚡ Gemini 2.5 Flash</div>
    <button class="btn-history" onclick="toggleHistory()">🕓 History <span id="histCount"></span></button>
  </div>
</header>

<!-- History overlay -->
<div class="history-overlay" id="historyOverlay" onclick="closeHistoryIfOutside(event)">
  <div class="history-panel" id="historyPanel">
    <div class="history-header">
      <div class="history-title">📋 Analysis History</div>
      <button class="btn-close" onclick="toggleHistory()">✕</button>
    </div>
    <div id="historyList"><div class="history-empty">No analyses saved yet.<br>Run your first analysis below!</div></div>
    <button class="btn-clear-hist" onclick="clearHistory()">🗑 Clear All History</button>
  </div>
</div>

<main>
  <!-- Top area -->
  <div class="top-area">
    <div class="api-row">
      <span>🔑</span>
      <input type="password" class="api-key-input" id="apiKey" placeholder="Paste your Gemini API key — AIza..." />
      <span class="api-hint">Free at aistudio.google.com</span>
    </div>

    <!-- Mode toggle -->
    <div class="mode-row">
      <button class="mode-btn active" id="modeSingle" onclick="setMode('single')">🔍 Single Product</button>
      <button class="mode-btn" id="modeCompare" onclick="setMode('compare')">⚔️ Compare Two Products</button>
    </div>

    <!-- Search inputs -->
    <div class="search-row" id="searchRow">
      <div class="search-wrap" style="flex:1">
        <input type="text" class="search-input" id="productInput"
          placeholder="e.g. boAt Airdopes, Tata Neu, Zepto, iPhone 15..."
          onkeydown="if(event.key==='Enter') run()" />
      </div>
      <div class="vs-badge" id="vsBadge" style="display:none">VS</div>
      <div class="search-wrap" id="product2Wrap" style="flex:1;display:none">
        <input type="text" class="search-input" id="productInput2"
          placeholder="e.g. Samsung Galaxy Buds, CRED, Blinkit..."
          onkeydown="if(event.key==='Enter') run()" />
      </div>
      <button class="search-btn" id="btn" onclick="run()">
        <span class="btn-label">⚡ Analyse</span>
        <div class="spinner"></div>
      </button>
    </div>

    <div class="examples" id="examples">
      <button class="chip" onclick="setP('boAt Airdopes earbuds')">boAt Airdopes</button>
      <button class="chip" onclick="setP('Tata Neu Super App')">Tata Neu</button>
      <button class="chip" onclick="setP('Zepto quick commerce')">Zepto</button>
      <button class="chip" onclick="setP('Apple iPhone 15')">iPhone 15</button>
      <button class="chip" onclick="setP('Tesla Model 3')">Tesla Model 3</button>
      <button class="chip" onclick="setP('Nykaa beauty platform')">Nykaa</button>
      <button class="chip" onclick="setP('Spotify Premium')">Spotify Premium</button>
      <button class="chip" onclick="setP('Dyson V15 vacuum')">Dyson V15</button>
    </div>
  </div>

  <!-- Status -->
  <div id="status"><div class="spin2"></div><span id="statusMsg">Searching the web and analysing…</span></div>

  <!-- Results -->
  <div id="results">

    <!-- Single mode banner -->
    <div class="banner" id="singleBanner">
      <div>
        <div class="banner-name" id="bName"></div>
        <div class="banner-meta" id="bMeta"></div>
      </div>
      <div class="banner-tag" id="bTag">Report</div>
    </div>

    <!-- Compare mode banner -->
    <div class="compare-banner" id="compareBanner" style="display:none">
      <div class="banner" style="margin-bottom:0">
        <div>
          <div class="banner-name" id="cName1"></div>
          <div class="banner-meta" id="cMeta1"></div>
        </div>
        <div class="banner-tag" id="cTag1">A</div>
      </div>
      <div class="vs-circle">VS</div>
      <div class="banner" style="margin-bottom:0">
        <div>
          <div class="banner-name" id="cName2"></div>
          <div class="banner-meta" id="cMeta2"></div>
        </div>
        <div class="banner-tag" id="cTag2">B</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="tab(0)"><span class="tab-num">1</span> Classification</button>
      <button class="tab" onclick="tab(1)"><span class="tab-num">2</span> Five Levels</button>
      <button class="tab" onclick="tab(2)"><span class="tab-num">3</span> Differentiation</button>
      <button class="tab" onclick="tab(3)"><span class="tab-num">4</span> Market Data</button>
      <button class="tab" onclick="tab(4)"><span class="tab-num">5</span> Competitors</button>
      <button class="tab" onclick="tab(5)"><span class="tab-num">6</span> Sentiment</button>
      <button class="tab" onclick="tab(6)"><span class="tab-num">7</span> Pricing</button>
    </div>

    <!-- Panel 1: Classification -->
    <div class="panel active" id="p0">
      <div id="classWrap"></div>
    </div>

    <!-- Panel 2: Five Levels -->
    <div class="panel" id="p1">
      <div id="levelsWrap"></div>
    </div>

    <!-- Panel 3: Differentiation -->
    <div class="panel" id="p2">
      <div id="diffWrap"></div>
    </div>

    <!-- Panel 4: Market Data -->
    <div class="panel" id="p3">
      <div id="marketWrap"></div>
    </div>

    <!-- Panel 5: Competitors -->
    <div class="panel" id="p4">
      <div id="compWrap"></div>
    </div>

    <!-- Panel 6: Sentiment -->
    <div class="panel" id="p5">
      <div id="sentWrap"></div>
    </div>

    <!-- Panel 7: Pricing -->
    <div class="panel" id="p6">
      <div id="priceWrap"></div>
    </div>

  </div><!-- /results -->
</main>

<script>
// ── State ──
let currentMode = 'single';
let chartInstances = {};
let analysisHistory = JSON.parse(localStorage.getItem('strategyHistory') || '[]');

// ── Mode ──
function setMode(m) {
  currentMode = m;
  document.getElementById('modeSingle').classList.toggle('active', m === 'single');
  document.getElementById('modeCompare').classList.toggle('active', m === 'compare');
  document.getElementById('vsBadge').style.display = m === 'compare' ? 'block' : 'none';
  document.getElementById('product2Wrap').style.display = m === 'compare' ? 'block' : 'none';
  document.getElementById('productInput').placeholder = m === 'compare'
    ? 'Product A e.g. boAt Airdopes...' : 'e.g. boAt Airdopes, Tata Neu, iPhone 15...';
}

function setP(v) { document.getElementById('productInput').value = v; }

function tab(i) {
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', i===j));
  document.querySelectorAll('.panel').forEach((p,j) => p.classList.toggle('active', i===j));
}

// ── History ──
function saveToHistory(product, data) {
  const entry = {
    id: Date.now(),
    product,
    category: data.category || '',
    buying_type: data.classification?.buying_type || '',
    timestamp: new Date().toLocaleString(),
    data
  };
  analysisHistory.unshift(entry);
  if (analysisHistory.length > 20) analysisHistory = analysisHistory.slice(0, 20);
  localStorage.setItem('strategyHistory', JSON.stringify(analysisHistory));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const count = document.getElementById('histCount');
  count.textContent = analysisHistory.length > 0 ? `(${analysisHistory.length})` : '';
  if (!analysisHistory.length) {
    list.innerHTML = '<div class="history-empty">No analyses saved yet.<br>Run your first analysis below!</div>';
    return;
  }
  list.innerHTML = analysisHistory.map(e => `
    <div class="history-item" onclick="loadFromHistory(${e.id})">
      <div class="hi-name">${e.product}</div>
      <div class="hi-meta">${e.category} · <span class="tag blue" style="font-size:10px">${e.buying_type}</span></div>
      <div class="hi-time">🕓 ${e.timestamp}</div>
    </div>`).join('');
}

function loadFromHistory(id) {
  const entry = analysisHistory.find(e => e.id === id);
  if (!entry) return;
  document.getElementById('productInput').value = entry.product;
  toggleHistory();
  setMode('single');
  renderAll(entry.product, entry.data, null);
  document.getElementById('results').classList.add('visible');
}

function clearHistory() {
  analysisHistory = [];
  localStorage.removeItem('strategyHistory');
  renderHistory();
}

function toggleHistory() {
  document.getElementById('historyOverlay').classList.toggle('open');
}

function closeHistoryIfOutside(e) {
  if (e.target === document.getElementById('historyOverlay')) toggleHistory();
}

renderHistory();

// ── Charts ──
function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

function makeLineChart(id, labels, values, label) {
  destroyChart(id);
  const ctx = document.getElementById(id)?.getContext('2d');
  if (!ctx) return;
  chartInstances[id] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label,
        data: values,
        borderColor: '#4285f4',
        backgroundColor: 'rgba(66,133,244,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#4285f4',
        pointRadius: 4,
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#3d5068', font: { family: 'DM Mono', size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#3d5068', font: { family: 'DM Mono', size: 10 } } }
      }
    }
  });
}

function makeBarChart(id, labels, values, colors) {
  destroyChart(id);
  const ctx = document.getElementById(id)?.getContext('2d');
  if (!ctx) return;
  chartInstances[id] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: colors || labels.map(() => 'rgba(66,133,244,0.5)'),
        borderColor: colors || labels.map(() => '#4285f4'),
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#3d5068', font: { family: 'DM Mono', size: 10 } } },
        y: { grid: { display: false }, ticks: { color: '#94a3b8', font: { family: 'DM Mono', size: 11 } } }
      }
    }
  });
}

function makeDoughnutChart(id, values, colors, labels) {
  destroyChart(id);
  const ctx = document.getElementById(id)?.getContext('2d');
  if (!ctx) return;
  chartInstances[id] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '70%',
      plugins: {
        legend: { position: 'bottom', labels: { color: '#94a3b8', font: { family: 'DM Mono', size: 10 }, boxWidth: 10, padding: 12 } }
      }
    }
  });
}

// ── Helpers ──
function stag(s) {
  const m = { strong:'green', adequate:'amber', weak:'red' };
  return `<span class="tag ${m[s]||'amber'}">${(s||'?').toUpperCase()}</span>`;
}

function threatClass(t) {
  return { high:'threat-high', medium:'threat-medium', low:'threat-low' }[t] || '';
}

function srcHTML(sources) {
  if (!sources?.length) return '';
  return `<div class="sources"><div class="sources-label">Web Sources</div>
    <div class="source-chips">
      ${sources.slice(0,5).map(s => `<a class="source-chip" href="${s.uri}" target="_blank">${s.title||s.uri}</a>`).join('')}
    </div></div>`;
}

function skHTML() {
  return `<div class="sk med"></div><div class="sk"></div><div class="sk short"></div><div class="sk med"></div>`;
}

function wrapCompare(html1, html2) {
  if (currentMode !== 'compare') return html1;
  return `<div class="compare-grid">
    <div class="compare-col"><div class="compare-col-header">
      <div class="compare-col-name" id="ccn1"></div></div>
      <div style="padding:16px">${html1}</div></div>
    <div class="compare-col"><div class="compare-col-header">
      <div class="compare-col-name" id="ccn2"></div></div>
      <div style="padding:16px">${html2}</div></div>
  </div>`;
}

// ── Render sections ──
function renderClassification(d, suffix='') {
  const c = d.classification || {};
  return `
    <div style="margin-bottom:12px">
      <span class="tag blue">${c.buying_type||'—'}</span>
      <span class="tag amber">${c.durability_tangibility||'—'}</span>
    </div>
    <h3>Buying Behaviour</h3><p>${c.buying_type_justification||''}</p>
    <h3>Durability &amp; Tangibility</h3><p>${c.durability_justification||''}</p>
    <h3>Strategic Implication</h3><p>${c.overall_classification_summary||''}</p>`;
}

function renderLevels(d) {
  const fl = d.five_levels || {};
  const lvls = [
    ['core_benefit','01','Core Benefit'],['basic_product','02','Basic Product'],
    ['expected_product','03','Expected Product'],['augmented_product','04','Augmented Product'],
    ['potential_product','05','Potential Product']
  ];
  return `<div class="levels-grid">
    ${lvls.map(([k,n,l]) => `
      <div class="level-row">
        <div><div class="level-num">${n}</div><div class="level-label">${l}</div>
          <div style="margin-top:5px">${stag((fl[k]||{}).strength)}</div></div>
        <div class="level-content">${(fl[k]||{}).content||'—'}</div>
      </div>`).join('')}
  </div>
  <h3 style="margin-top:14px">Gap Analysis</h3><p>${fl.gaps_summary||''}</p>`;
}

function renderDiff(d) {
  return `<div class="diff-list">
    ${(d.differentiation||[]).map((r,i) => `
      <div class="diff-item" data-n="${i+1}">
        <div class="diff-dim">${r.dimension||''}</div>
        <div class="diff-title">${r.title||''}</div>
        <div class="diff-text">${r.recommendation||''}</div>
        <div class="diff-why"><strong style="color:var(--text-dim)">Why:</strong> ${r.justification||''}</div>
      </div>`).join('')}
  </div>`;
}

function renderMarket(d, suffix='') {
  const m = d.market_data || {};
  const chartId = `growthChart${suffix}`;
  setTimeout(() => makeLineChart(chartId, m.growth_labels||[], m.growth_values||[], 'Market Growth Index'), 100);
  return `
    <div class="stat-row">
      <div class="stat-box"><div class="stat-label">Market Size</div>
        <div class="stat-value" style="font-size:16px">${m.market_size||'—'}</div></div>
      <div class="stat-box"><div class="stat-label">CAGR</div>
        <div class="stat-value">${m.market_growth_rate||'—'}</div></div>
      <div class="stat-box"><div class="stat-label">Est. Share</div>
        <div class="stat-value">${m.product_market_share||'—'}</div></div>
    </div>
    <h3>Market Growth Trend</h3>
    <div class="chart-wrap"><canvas id="${chartId}"></canvas></div>
    <h3 style="margin-top:14px">Target Segment</h3><p>${m.target_segment||''}</p>
    <h3>Market Summary</h3><p>${m.market_summary||''}</p>`;
}

function renderCompetitors(d, suffix='') {
  const comps = d.competitors || [];
  const shareChartId = `shareChart${suffix}`;
  setTimeout(() => {
    const labels = comps.map(c => c.name);
    const vals = comps.map(c => c.market_share_value || 0);
    const colors = comps.map((c) => {
      const t = c.threat_level;
      return t==='high' ? 'rgba(239,68,68,0.6)' : t==='medium' ? 'rgba(245,158,11,0.6)' : 'rgba(16,185,129,0.6)';
    });
    makeBarChart(shareChartId, labels, vals, colors);
  }, 100);
  return `
    <h3>Market Share by Competitor</h3>
    <div class="chart-wrap" style="height:${Math.max(160, comps.length*44)}px"><canvas id="${shareChartId}"></canvas></div>
    <h3 style="margin-top:16px">Competitor Details</h3>
    <table class="comp-table">
      <thead><tr>
        <th>Competitor</th><th>Price</th><th>Share</th><th>Strength</th><th>Weakness</th><th>Threat</th>
      </tr></thead>
      <tbody>
        ${comps.map(c => `<tr>
          <td class="comp-name">${c.name}</td>
          <td>${c.price||'—'}</td>
          <td>${c.market_share||'—'}</td>
          <td>${c.key_strength||'—'}</td>
          <td>${c.key_weakness||'—'}</td>
          <td class="${threatClass(c.threat_level)}">${(c.threat_level||'—').toUpperCase()}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function renderSentiment(d, suffix='') {
  const s = d.sentiment || {};
  const donutId = `sentDonut${suffix}`;
  setTimeout(() => makeDoughnutChart(donutId,
    [s.positive||0, s.neutral||0, s.negative||0],
    ['rgba(16,185,129,0.8)', 'rgba(245,158,11,0.8)', 'rgba(239,68,68,0.8)'],
    ['Positive', 'Neutral', 'Negative']), 100);

  const score = s.overall_score || 0;
  const scoreColor = score >= 70 ? '#34d399' : score >= 50 ? '#fbbf24' : '#fca5a5';
  return `
    <div class="section-grid" style="grid-template-columns:180px 1fr;margin-bottom:16px">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px">
        <div style="font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:${scoreColor}">${score}</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim)">Sentiment Score</div>
        <div class="chart-wrap" style="height:140px;width:160px"><canvas id="${donutId}"></canvas></div>
      </div>
      <div>
        <div class="sentiment-bars">
          <div class="sent-row">
            <div class="sent-label" style="color:#34d399">Positive</div>
            <div class="sent-bar-bg"><div class="sent-bar-fill" style="width:${s.positive||0}%;background:#34d399"></div></div>
            <div class="sent-val">${s.positive||0}%</div>
          </div>
          <div class="sent-row">
            <div class="sent-label" style="color:#fbbf24">Neutral</div>
            <div class="sent-bar-bg"><div class="sent-bar-fill" style="width:${s.neutral||0}%;background:#fbbf24"></div></div>
            <div class="sent-val">${s.neutral||0}%</div>
          </div>
          <div class="sent-row">
            <div class="sent-label" style="color:#fca5a5">Negative</div>
            <div class="sent-bar-bg"><div class="sent-bar-fill" style="width:${s.negative||0}%;background:#ef4444"></div></div>
            <div class="sent-val">${s.negative||0}%</div>
          </div>
        </div>
        <h3 style="margin-top:16px">What Customers Love</h3>
        ${(s.top_positives||[]).map(p => `<p>✅ ${p}</p>`).join('')}
        <h3>Main Complaints</h3>
        ${(s.top_negatives||[]).map(n => `<p>⚠️ ${n}</p>`).join('')}
      </div>
    </div>
    <h3>Review Summary</h3><p>${s.review_summary||''}</p>`;
}

function renderPricing(d, suffix='') {
  const pr = d.pricing || {};
  const barId = `priceChart${suffix}`;
  const items = pr.price_comparison || [];
  setTimeout(() => {
    const labels = items.map(i => i.label);
    const vals = items.map(i => i.value || 0);
    const colors = items.map(i => i.is_subject
      ? 'rgba(66,133,244,0.7)' : 'rgba(148,163,184,0.3)');
    makeBarChart(barId, labels, vals, colors);
  }, 100);

  const posColors = { budget:'green', 'mid-range':'amber', premium:'purple', luxury:'red' };
  const pos = pr.price_position || 'mid-range';
  return `
    <div class="stat-row" style="grid-template-columns:1fr 1fr;margin-bottom:16px">
      <div class="stat-box">
        <div class="stat-label">Product Price</div>
        <div class="stat-value" style="font-size:18px">${pr.product_price||'—'}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Price Position</div>
        <div class="stat-value" style="font-size:15px;margin-top:4px">
          <span class="tag ${posColors[pos]||'amber'}">${pos.toUpperCase()}</span>
        </div>
      </div>
    </div>
    <h3>Price vs Competitors</h3>
    <div class="chart-wrap" style="height:${Math.max(160, items.length*44)}px"><canvas id="${barId}"></canvas></div>
    <h3 style="margin-top:14px">Pricing Strategy</h3>
    <p>${pr.price_summary||''}</p>`;
}

// ── Render all panels ──
function renderAll(product, d1, d2) {
  const isCmp = currentMode === 'compare' && d2;

  // Banners
  document.getElementById('singleBanner').style.display = isCmp ? 'none' : '';
  document.getElementById('compareBanner').style.display = isCmp ? '' : 'none';

  if (!isCmp) {
    document.getElementById('bName').textContent = product;
    document.getElementById('bMeta').innerHTML = `${d1.product_summary||''}<br><span style="color:var(--text-dim)">${d1.category||''}</span>`;
    document.getElementById('bTag').textContent = (d1.classification?.buying_type||'analysed').toUpperCase();
  } else {
    document.getElementById('cName1').textContent = d1.product_name || product;
    document.getElementById('cMeta1').innerHTML = `${d1.category||''}`;
    document.getElementById('cTag1').textContent = (d1.classification?.buying_type||'A').toUpperCase();
    document.getElementById('cName2').textContent = d2.product_name || '';
    document.getElementById('cMeta2').innerHTML = `${d2.category||''}`;
    document.getElementById('cTag2').textContent = (d2.classification?.buying_type||'B').toUpperCase();
  }

  function render(wrapperId, fn, suffix1, suffix2) {
    const el = document.getElementById(wrapperId);
    if (isCmp) {
      const h1 = `<div class="card-body">${fn(d1, suffix1)}</div>`;
      const h2 = `<div class="card-body">${fn(d2, suffix2)}</div>`;
      el.innerHTML = wrapCompare(h1, h2);
      if (document.getElementById('ccn1')) document.getElementById('ccn1').textContent = d1.product_name||'Product A';
      if (document.getElementById('ccn2')) document.getElementById('ccn2').textContent = d2.product_name||'Product B';
    } else {
      el.innerHTML = `<div class="card blue"><div class="card-body">${fn(d1, suffix1)}${srcHTML(d1.sources)}</div></div>`;
    }
  }

  document.getElementById('classWrap').innerHTML = '';
  document.getElementById('levelsWrap').innerHTML = '';
  document.getElementById('diffWrap').innerHTML = '';
  document.getElementById('marketWrap').innerHTML = '';
  document.getElementById('compWrap').innerHTML = '';
  document.getElementById('sentWrap').innerHTML = '';
  document.getElementById('priceWrap').innerHTML = '';

  render('classWrap',  renderClassification, 'A', 'B');
  render('levelsWrap', renderLevels,         'A', 'B');
  render('diffWrap',   renderDiff,           'A', 'B');
  render('marketWrap', renderMarket,         'A', 'B');
  render('compWrap',   renderCompetitors,    'A', 'B');
  render('sentWrap',   renderSentiment,      'A', 'B');
  render('priceWrap',  renderPricing,        'A', 'B');

  tab(0);
}

// ── Main run ──
async function run() {
  const product = document.getElementById('productInput').value.trim();
  const product2 = document.getElementById('productInput2').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();

  if (!product) { document.getElementById('productInput').focus(); return; }
  if (currentMode === 'compare' && !product2) { document.getElementById('productInput2').focus(); return; }
  if (!apiKey) { document.getElementById('apiKey').focus(); return; }

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.classList.add('loading');
  document.getElementById('status').className = 'visible';
  document.getElementById('statusMsg').textContent = currentMode === 'compare'
    ? `Researching ${product} and ${product2}…` : `Searching web and analysing ${product}…`;
  document.getElementById('results').className = '';

  async function fetchProduct(p) {
    const res = await fetch('/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product: p, api_key: apiKey })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    return d;
  }

  try {
    let d1, d2 = null;
    if (currentMode === 'compare') {
      [d1, d2] = await Promise.all([fetchProduct(product), fetchProduct(product2)]);
    } else {
      d1 = await fetchProduct(product);
    }

    saveToHistory(product, d1);
    if (d2) saveToHistory(product2, d2);

    renderAll(product, d1, d2);
    document.getElementById('results').classList.add('visible');

  } catch(e) {
    document.getElementById('classWrap').innerHTML =
      `<div class="error-box">⚠️ <strong>Error:</strong> ${e.message}<br><br>Check your API key and try again.</div>`;
    document.getElementById('results').classList.add('visible');
  }

  document.getElementById('status').className = '';
  btn.disabled = false;
  btn.classList.remove('loading');
}
</script>
</body>
</html>
